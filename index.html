<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Márcio Xavier</title>
  <meta name="description" content="Analista de Sistemas com experiência em desenvolvimento web, BI e Ciência de Dados. Brasília, DF." />
  <meta property="og:title"       content="Márcio Xavier — Analista de Sistemas" />
  <meta property="og:description" content="Analista de Sistemas com experiência em desenvolvimento web, BI e Ciência de Dados." />
  <meta property="og:type"        content="website" />

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Custom styles -->
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>

<body class="bg-white text-gray-900 font-sans antialiased">
<div id="app" class="max-w-4xl mx-auto px-5 sm:px-8 py-14 sm:py-20 pb-28">

  <!-- ══ HERO ══════════════════════════════════════════════ -->
  <header id="hero" class="pb-12 border-b border-gray-100 mb-16 animate-rise delay-0">
    <!-- Populated by main.js -->
  </header>

  <!-- ══ EXPERIÊNCIA ═══════════════════════════════════════ -->
  <section class="mb-16 observe">
    <div class="flex items-center gap-4 mb-8">
      <span class="text-xs font-bold tracking-widest uppercase text-blue-600 whitespace-nowrap">
        Experiência Profissional
      </span>
      <div class="flex-1 h-px bg-gray-100"></div>
    </div>
    <div id="section-experience" class="flex flex-col gap-3">
      <!-- Skeleton loading -->
      <div class="skeleton h-40 w-full"></div>
      <div class="skeleton h-32 w-full"></div>
      <div class="skeleton h-28 w-full"></div>
    </div>
  </section>

  <!-- ══ FORMAÇÃO ══════════════════════════════════════════ -->
  <section class="mb-16 observe">
    <div class="flex items-center gap-4 mb-8">
      <span class="text-xs font-bold tracking-widest uppercase text-blue-600 whitespace-nowrap">
        Formação Acadêmica
      </span>
      <div class="flex-1 h-px bg-gray-100"></div>
    </div>
    <div id="section-education" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div class="skeleton h-24 w-full"></div>
      <div class="skeleton h-24 w-full"></div>
      <div class="skeleton h-24 w-full"></div>
      <div class="skeleton h-24 w-full"></div>
    </div>
  </section>

  <!-- ══ CERTIFICAÇÕES ═════════════════════════════════════ -->
  <section class="mb-16 observe">
    <div class="flex items-center gap-4 mb-8">
      <span class="text-xs font-bold tracking-widest uppercase text-blue-600 whitespace-nowrap">
        Certificações
      </span>
      <div class="flex-1 h-px bg-gray-100"></div>
    </div>
    <div id="section-certifications" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div class="skeleton h-24 w-full"></div>
      <div class="skeleton h-24 w-full"></div>
    </div>
  </section>

  <!-- ══ COMPETÊNCIAS ══════════════════════════════════════ -->
  <section class="mb-16 observe">
    <div class="flex items-center gap-4 mb-8">
      <span class="text-xs font-bold tracking-widest uppercase text-blue-600 whitespace-nowrap">
        Competências
      </span>
      <div class="flex-1 h-px bg-gray-100"></div>
    </div>
    <!-- Top 3 -->
    <div id="skills-highlight" class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6">
      <div class="skeleton h-36 w-full"></div>
      <div class="skeleton h-36 w-full"></div>
      <div class="skeleton h-36 w-full"></div>
    </div>
    <!-- Categories -->
    <div id="skills-categories" class="flex flex-col gap-5">
      <div class="skeleton h-12 w-full"></div>
      <div class="skeleton h-12 w-full"></div>
      <div class="skeleton h-12 w-full"></div>
    </div>
  </section>

  <!-- ══ FOOTER ════════════════════════════════════════════ -->
  <footer class="border-t border-gray-100 pt-6 flex flex-wrap justify-between gap-3
    text-xs font-medium text-gray-300 tracking-wide observe">
    <span id="footer-name"></span>
    <span>Brasília — DF</span>
  </footer>

  <!-- year fallback -->
  <span id="year" class="hidden"></span>

</div>

<!-- App entry point (ES modules) -->
<script type="module" src="./assets/js/main.js"></script>
</body>
</html>
